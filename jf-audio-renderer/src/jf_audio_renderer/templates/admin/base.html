<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Admin{% endblock %} · {{ service }}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0b10;
        --card: #14141f;
        --bd: rgba(255, 255, 255, 0.1);
        --txt: #f3f3f8;
        --muted: #9b9bb0;
        --acc: #8b5cf6;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--txt);
        line-height: 1.45;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      h1 {
        font-size: 1.35rem;
        margin: 0 0 8px;
      }
      .muted {
        color: var(--muted);
        font-size: 0.92rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--bd);
        border-radius: 14px;
        padding: 16px;
        margin-top: 16px;
      }
      label {
        display: block;
        font-size: 0.82rem;
        color: var(--muted);
        margin: 10px 0 4px;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px 11px;
        border-radius: 10px;
        border: 1px solid var(--bd);
        background: #0e0e16;
        color: var(--txt);
        font: inherit;
        box-sizing: border-box;
      }
      textarea {
        min-height: 72px;
        resize: vertical;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      button,
      .btn {
        border: 1px solid var(--bd);
        background: #1b1b2a;
        color: var(--txt);
        padding: 10px 14px;
        border-radius: 10px;
        font: inherit;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      button.primary,
      .btn.primary {
        background: linear-gradient(135deg, #7c3aed, #db2777);
        border-color: transparent;
        font-weight: 700;
      }
      button.danger,
      .btn.danger {
        background: #3f1518;
        border-color: rgba(248, 113, 113, 0.45);
        color: #fecaca;
      }
      button.danger:hover,
      .btn.danger:hover {
        background: #5c1d22;
      }
      .err {
        color: #fecaca;
        margin-top: 10px;
      }
      .ok {
        color: #bbf7d0;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>{% block heading %}{% endblock %}</h1>
      <p class="muted">{% block sub %}{% endblock %}</p>
      {% block body %}{% endblock %}
    </main>
  </body>
</html>
